name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTDOCFLAGS: -Dwarnings

# ---------------------------------------------------------------------------
# Gate: cheap jobs that must pass before expensive ones run
# ---------------------------------------------------------------------------
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  typos:
    name: Spell check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libclang-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libclang-dev pkg-config
      - run: cargo doc --workspace --no-deps

  # Gate job: all cheap checks must pass
  basics:
    name: Basics gate
    runs-on: ubuntu-latest
    needs: [fmt, typos, clippy, doc]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.typos.result }}" != "success" ||
                "${{ needs.clippy.result }}" != "success" ||
                "${{ needs.doc.result }}" != "success" ]]; then
            echo "One or more basic checks failed"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Tests: run after basics gate passes
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    needs: [basics]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libclang-dev pkg-config

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      - name: Build ferridriver binary
        run: cargo build --bin ferridriver

      - name: Install Chromium with system deps
        run: ./target/debug/ferridriver install --with-deps chromium

      - name: Run unit + integration tests
        env:
          FERRIDRIVER_BIN: ${{ github.workspace }}/target/debug/ferridriver
        run: |
          cargo nextest run --workspace --no-fail-fast \
            --exclude ct-dioxus-todomvc \
            --exclude ct-leptos-todomvc \
            --exclude bdd-example

      - name: Run CLI backend tests (cdp-pipe)
        env:
          FERRIDRIVER_BIN: ${{ github.workspace }}/target/debug/ferridriver
        run: cargo test -p ferridriver-cli --test backends -- "all_tests_cdp_pipe" --nocapture

      - name: Run CLI backend tests (cdp-raw)
        env:
          FERRIDRIVER_BIN: ${{ github.workspace }}/target/debug/ferridriver
        run: cargo test -p ferridriver-cli --test backends -- "all_tests_cdp_raw" --nocapture

      - name: Run doc tests
        run: cargo test --doc --workspace

  # ---------------------------------------------------------------------------
  # NAPI: build native addon and run TypeScript tests
  # ---------------------------------------------------------------------------
  napi:
    name: NAPI build & test
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: oven-sh/setup-bun@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libclang-dev pkg-config
      - name: Build ferridriver binary
        run: cargo build --bin ferridriver
      - name: Install Chromium with system deps
        run: ./target/debug/ferridriver install --with-deps chromium
      - name: Install dependencies
        run: bun install
      - name: Build NAPI debug
        working-directory: crates/ferridriver-napi
        run: bun run build:debug
      - name: Run TypeScript tests
        working-directory: crates/ferridriver-napi
        run: bun test

  # ---------------------------------------------------------------------------
  # Security: audit dependencies for known vulnerabilities
  # ---------------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lockfile: ensure Cargo.lock is committed and up to date
  # ---------------------------------------------------------------------------
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libclang-dev pkg-config
      - run: cargo check --locked --workspace

  # ---------------------------------------------------------------------------
  # Conclusion: aggregator for branch protection rules
  # ---------------------------------------------------------------------------
  conclusion:
    name: CI conclusion
    if: always()
    needs:
      - test
      - napi
      - security
      - lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Result
        run: |
          jq -ce '.[] | select(.result != "success" and .result != "skipped")' <<< '${{ toJson(needs) }}' \
            && echo "Some jobs failed" && exit 1 \
            || echo "All jobs passed or were skipped"

name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTDOCFLAGS: -Dwarnings

# ---------------------------------------------------------------------------
# Gate: cheap jobs that must pass before expensive ones run
# ---------------------------------------------------------------------------
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  typos:
    name: Spell check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system deps
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends \
            libclang-dev pkg-config \
            libwebkitgtk-6.0-dev libgtk-4-dev libsoup-3.0-dev
      - run: |
          cargo clippy --workspace --all-targets \
            --exclude bdd-example

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system deps
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends \
            libclang-dev pkg-config \
            libwebkitgtk-6.0-dev libgtk-4-dev libsoup-3.0-dev
      - run: |
          cargo doc --workspace --no-deps \
            --exclude bdd-example

  # Gate job: all cheap checks must pass
  basics:
    name: Basics gate
    runs-on: ubuntu-latest
    needs: [fmt, typos, clippy, doc]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.typos.result }}" != "success" ||
                "${{ needs.clippy.result }}" != "success" ||
                "${{ needs.doc.result }}" != "success" ]]; then
            echo "One or more basic checks failed"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Tests: run after basics gate passes
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    needs: [basics]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - uses: oven-sh/setup-bun@v2

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends \
            libclang-dev pkg-config ffmpeg \
            libdbus-glib-1-2 libxt6 libxtst6 libgtk-3-0t64 \
            libwebkitgtk-6.0-dev libgtk-4-dev libsoup-3.0-dev xvfb

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config llvm ffmpeg

      - name: Build ferridriver binaries
        run: cargo build --bin ferridriver --bin ferridriver-webkit-host

      - name: Install Chromium with system deps
        run: cargo run --bin ferridriver -- install --with-deps chromium

      - name: Run unit + integration tests
        env:
          FERRIDRIVER_BIN: ${{ github.workspace }}/target/debug/ferridriver
          FERRIDRIVER_WEBKIT_HOST: ${{ github.workspace }}/target/debug/ferridriver-webkit-host
          # Force the Linux host to self-exec under `xvfb-run -a`.
          # The macOS leg ignores this and runs the native WKWebView
          # path. See `crates/ferridriver-webkit-host/src/linux/mod.rs::run`.
          FERRIDRIVER_WEBKIT_HEADLESS: "1"
          # Limit nextest parallelism — many integration tests spawn a
          # browser per test, so running N at once on a 2-4 core
          # runner exhausts memory and they all hit the per-test
          # 30s deadline. `-j 2` keeps the lib-test fan-out reasonable
          # while serialising the browser-heavy ones.
        run: |
          cargo nextest run --workspace --no-fail-fast -j 2 \
            --exclude bdd-example

      - name: Run doc tests
        run: cargo test --doc --workspace

  # ---------------------------------------------------------------------------
  # Security: audit dependencies for known vulnerabilities
  # ---------------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          createIssues: false

  # ---------------------------------------------------------------------------
  # Lockfile: ensure Cargo.lock is committed and up to date
  # ---------------------------------------------------------------------------
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends \
            libclang-dev pkg-config \
            libwebkitgtk-6.0-dev libgtk-4-dev libsoup-3.0-dev
      - run: cargo check --locked --workspace

  # ---------------------------------------------------------------------------
  # Conclusion: aggregator for branch protection rules
  # ---------------------------------------------------------------------------
  conclusion:
    name: CI conclusion
    if: always()
    needs:
      - test
      - security
      - lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Result
        run: |
          jq -ce '.[] | select(.result != "success" and .result != "skipped")' <<< '${{ toJson(needs) }}' \
            && echo "Some jobs failed" && exit 1 \
            || echo "All jobs passed or were skipped"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" fill="none">
  <title>ferridriver</title>

  <g transform="translate(4, 4)">
    <!-- Eye stalks -->
    <path d="M20.5 8 L18.5 2.5" stroke="#1f1f1f" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M27.5 8 L29.5 2.5" stroke="#1f1f1f" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Eyes -->
    <circle cx="18.5" cy="2.5" r="2" fill="#dea584" stroke="#1f1f1f" stroke-width="0.9"/>
    <circle cx="29.5" cy="2.5" r="2" fill="#dea584" stroke="#1f1f1f" stroke-width="0.9"/>
    <circle cx="18.8" cy="2.8" r="0.7" fill="#1f1f1f"/>
    <circle cx="29.8" cy="2.8" r="0.7" fill="#1f1f1f"/>

    <!-- Left claw -->
    <path d="M6 24 Q0 21 1.5 28 Q2.5 32 7 30 Q5 28 5.5 26 Q6 24.5 6 24 Z"
          fill="#dea584" stroke="#1f1f1f" stroke-width="1.1" stroke-linejoin="round"/>

    <!-- Right claw -->
    <path d="M42 24 Q48 21 46.5 28 Q45.5 32 41 30 Q43 28 42.5 26 Q42 24.5 42 24 Z"
          fill="#dea584" stroke="#1f1f1f" stroke-width="1.1" stroke-linejoin="round"/>

    <!-- Browser frame with ferris hump -->
    <path d="M 6 16 Q 6 13 9 13 L 16 13 Q 24 3 32 13 L 39 13 Q 42 13 42 16
             L 42 41 Q 42 44 39 44 L 9 44 Q 6 44 6 41 Z"
          fill="#dea584" stroke="#1f1f1f" stroke-width="1.4" stroke-linejoin="round"/>

    <!-- URL bar separator -->
    <line x1="6" y1="21" x2="42" y2="21" stroke="#1f1f1f" stroke-width="1.2"/>

    <!-- Traffic dots -->
    <circle cx="10" cy="17" r="0.9" fill="#1f1f1f"/>
    <circle cx="13" cy="17" r="0.9" fill="#1f1f1f"/>
    <circle cx="16" cy="17" r="0.9" fill="#1f1f1f"/>

    <!-- URL stub -->
    <rect x="20" y="15.5" width="20" height="3" rx="1.5" fill="#1f1f1f" opacity="0.25"/>

    <!-- Content area -->
    <rect x="9" y="24" width="30" height="17" rx="1.5" fill="#1f1f1f"/>

    <!-- Play triangle -->
    <path d="M20.5 28 L20.5 37 L29 32.5 Z" fill="#dea584"/>

    <!-- Legs -->
    <line x1="12" y1="44" x2="11" y2="47" stroke="#1f1f1f" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="17" y1="44" x2="16.5" y2="47.5" stroke="#1f1f1f" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="22" y1="44" x2="22" y2="47.5" stroke="#1f1f1f" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="26" y1="44" x2="26" y2="47.5" stroke="#1f1f1f" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="31" y1="44" x2="31.5" y2="47.5" stroke="#1f1f1f" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="36" y1="44" x2="37" y2="47" stroke="#1f1f1f" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <text x="68" y="38" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="26" font-weight="700" fill="currentColor" letter-spacing="-0.5">ferridriver</text>
</svg>

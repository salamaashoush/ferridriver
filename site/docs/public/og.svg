<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0f1115"/>
  <defs>
    <radialGradient id="glow" cx="0.85" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#dea584" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#dea584" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Large ferris on right -->
  <g transform="translate(820, 130) scale(7)">
    <path d="M 14 26 Q 6 22 2 28 Q 0 33 7 35 Q 11 35 14 32 L 14 30 Q 9 30 8 28 Q 9 26 14 26 Z"
          fill="#dea584" stroke="#0f1115" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M 34 26 Q 42 22 46 28 Q 48 33 41 35 Q 37 35 34 32 L 34 30 Q 39 30 40 28 Q 39 26 34 26 Z"
          fill="#dea584" stroke="#0f1115" stroke-width="1.4" stroke-linejoin="round"/>
    <ellipse cx="24" cy="30" rx="13" ry="8" fill="#dea584" stroke="#0f1115" stroke-width="1.5"/>
    <path d="M 19 22 L 17 14" stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 29 22 L 31 14" stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="17" cy="12.5" r="3" fill="#f5f5f7" stroke="#0f1115" stroke-width="1.3"/>
    <circle cx="31" cy="12.5" r="3" fill="#f5f5f7" stroke="#0f1115" stroke-width="1.3"/>
    <circle cx="17.7" cy="13" r="1.2" fill="#0f1115"/>
    <circle cx="31.7" cy="13" r="1.2" fill="#0f1115"/>
    <path d="M 20 31 Q 24 35 28 31" stroke="#0f1115" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="15" y1="37.5" x2="13" y2="43"  stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="38"   x2="18" y2="44"  stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="23" y1="38"   x2="23" y2="44.5" stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="27" y1="38"   x2="28" y2="44.5" stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="31" y1="38"   x2="32" y2="44"  stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="37.5" x2="37" y2="43"  stroke="#0f1115" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <text x="80" y="240" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="96" font-weight="800" fill="#f5f5f7" letter-spacing="-3">ferridriver</text>
  <text x="80" y="300" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="34" font-weight="500" fill="#dea584">Rust-native browser automation</text>
  <text x="80" y="346" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" fill="#a1a1aa">Playwright-compatible API · 4 backends · test runner · BDD · MCP server</text>

  <g transform="translate(80, 430)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
    <rect x="-12" y="-26" width="640" height="118" rx="10" fill="#1a1d24" stroke="#26292f" stroke-width="1"/>
    <circle cx="6" cy="-12" r="4" fill="#ff5f56"/>
    <circle cx="20" cy="-12" r="4" fill="#ffbd2e"/>
    <circle cx="34" cy="-12" r="4" fill="#27c93f"/>
    <text x="0" y="14" fill="#dea584">$ cargo install ferridriver-cli</text>
    <text x="0" y="44" fill="#a1a1aa">$ ferridriver mcp                    <tspan fill="#52525b"># AI-agent browser server</tspan></text>
    <text x="0" y="74" fill="#a1a1aa">$ ferridriver bdd tests/features/    <tspan fill="#52525b"># Gherkin features</tspan></text>
  </g>

  <text x="1120" y="600" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="20" fill="#52525b">github.com/salamaashoush/ferridriver</text>

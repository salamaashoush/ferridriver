[test]
features = ["../bdd-features/generated/*.feature"]
test_match = ["../bdd-features/generated/*.feature"]
fully_parallel = true
timeout = 30000
retries = 0
reporter = []
base_url = "http://localhost:3030"

[test.browser]
headless = true

[[test.web_server]]
command = "bun ../app/server.ts"
url = "http://localhost:3030/healthz"
timeout = 30000
reuse_existing_server = true

[test.web_server.env]
PORT = "3030"

<!DOCTYPE html>
<html><head><title>Keyboard test</title></head>
<body>
<textarea id="area" spellcheck="false"></textarea>
<script>
  window.keyLog = [];
  const area = document.getElementById('area');
  area.focus();
  ['keydown', 'keypress', 'keyup'].forEach(type => {
    area.addEventListener(type, e => {
      window.keyLog.push({
        type,
        key: e.key,
        code: e.code,
        ctrlKey: e.ctrlKey,
        shiftKey: e.shiftKey,
        altKey: e.altKey,
        metaKey: e.metaKey,
        repeat: e.repeat,
        location: e.location,
      });
    });
  });
</script>
</body></html>

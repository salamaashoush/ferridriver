<!DOCTYPE html>
<html><head><title>Screenshot Grid</title>
<style>
  body { margin: 0; }
  .row { display: flex; }
  .cell { width: 50px; height: 50px; flex-shrink: 0; }
</style>
</head>
<body>
<script>
  // 20x40 grid = 1000x2000px, taller than viewport for full-page test
  for (let r = 0; r < 40; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    for (let c = 0; c < 20; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.backgroundColor = `hsl(${(r * 20 + c * 18) % 360}, 80%, 70%)`;
      row.appendChild(cell);
    }
    document.body.appendChild(row);
  }
</script>
</body></html>

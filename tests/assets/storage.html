<!DOCTYPE html>
<html><head><title>Storage test</title></head>
<body>
<div id="local-output"></div>
<div id="session-output"></div>
<script>
  // Expose storage state for verification
  window.getLocalStorage = () => {
    const items = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      items[key] = localStorage.getItem(key);
    }
    return items;
  };
  window.getSessionStorage = () => {
    const items = {};
    for (let i = 0; i < sessionStorage.length; i++) {
      const key = sessionStorage.key(i);
      items[key] = sessionStorage.getItem(key);
    }
    return items;
  };
  function updateDisplay() {
    document.getElementById('local-output').textContent = 'Local: ' + JSON.stringify(window.getLocalStorage());
    document.getElementById('session-output').textContent = 'Session: ' + JSON.stringify(window.getSessionStorage());
  }
  window.addEventListener('storage', updateDisplay);
  updateDisplay();
</script>
</body></html>

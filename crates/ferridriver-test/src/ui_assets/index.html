<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ferridriver UI</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%237aa2f7'/%3E%3C/svg%3E">
<script>
/* Apply the stored explicit theme before first paint so a dark-pref user
   on a light OS (or vice versa) gets no flash. "auto" stays attribute-free
   and follows prefers-color-scheme via CSS. */
(() => {
  try {
    const pref = localStorage.getItem("fd-ui-theme");
    if (pref === "light" || pref === "dark") document.documentElement.dataset.theme = pref;
  } catch (_) { /* private mode */ }
})();
</script>
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-panel: #f6f7f8;
    --bg-inset: #eef0f3;
    --bg-hover: #e9ebee;
    --bg-active: #dde3ed;
    --border: #d8dbe0;
    --border-strong: #bfc5cd;
    --fg: #21252b;
    --fg-mid: #4b5460;
    --fg-dim: #767f8a;
    --accent: #2e6bd6;
    --accent-dim: #2558b8;
    --accent-soft: rgba(46, 107, 214, 0.08);
    --green: #1a7f37;
    --red: #d1242f;
    --amber: #9a6700;
    --orange: #bc4c00;
    --gray: #8c959f;
    --danger-bg: #fdeef0;
    --error-border: rgba(209, 36, 47, 0.4);
    --btn-hover-fg: #10131a;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 14px;
  }
  /* Dark palette (Tokyo Night). Duplicated in the media block below —
     keep the two in sync. */
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #16161e;
    --bg-panel: #1a1b26;
    --bg-inset: #13131a;
    --bg-hover: #222330;
    --bg-active: #2a2c3d;
    --border: #2c2e3f;
    --border-strong: #3b3d52;
    --fg: #c0caf5;
    --fg-mid: #9aa5ce;
    --fg-dim: #676e95;
    --accent: #7aa2f7;
    --accent-dim: #3d59a1;
    --accent-soft: rgba(122, 162, 247, 0.1);
    --green: #9ece6a;
    --red: #f7768e;
    --amber: #e0af68;
    --orange: #ff9e64;
    --gray: #565f89;
    --danger-bg: #3b2735;
    --error-border: rgba(247, 118, 142, 0.5);
    --btn-hover-fg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      color-scheme: dark;
      --bg: #16161e;
      --bg-panel: #1a1b26;
      --bg-inset: #13131a;
      --bg-hover: #222330;
      --bg-active: #2a2c3d;
      --border: #2c2e3f;
      --border-strong: #3b3d52;
      --fg: #c0caf5;
      --fg-mid: #9aa5ce;
      --fg-dim: #676e95;
      --accent: #7aa2f7;
      --accent-dim: #3d59a1;
      --accent-soft: rgba(122, 162, 247, 0.1);
      --green: #9ece6a;
      --red: #f7768e;
      --amber: #e0af68;
      --orange: #ff9e64;
      --gray: #565f89;
      --danger-bg: #3b2735;
      --error-border: rgba(247, 118, 142, 0.5);
      --btn-hover-fg: #ffffff;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-active);
    color: var(--fg);
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    padding: 5px 11px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  button svg { width: 11px; height: 11px; flex: none; }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--btn-hover-fg); }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
  button.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
  button.subtle { background: transparent; border-color: transparent; color: var(--fg-dim); padding: 3px 8px; }
  button.subtle:hover:not(:disabled) { color: var(--fg); border-color: var(--border-strong); }

  /* ── Status icons ── */
  .sicon { width: 16px; height: 16px; flex: none; display: inline-flex; align-items: center; justify-content: center; }
  .sicon svg { width: 14px; height: 14px; display: block; }
  .sicon.s-idle { color: var(--gray); }
  .sicon.s-running { color: var(--amber); }
  .sicon.s-running svg { animation: spin 0.9s linear infinite; }
  .sicon.s-passed { color: var(--green); }
  .sicon.s-failed { color: var(--red); }
  .sicon.s-skipped { color: var(--gray); }
  .sicon.s-flaky { color: var(--orange); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 14px;
    height: 44px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex: none;
    position: relative;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand svg { width: 16px; height: 16px; }
  .brand h1 { font-size: 14px; font-weight: 650; letter-spacing: 0.01em; }
  .brand .mode {
    font-size: 10px;
    font-weight: 600;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 1px 6px;
  }
  .conn { display: inline-flex; align-items: center; gap: 7px; color: var(--fg-dim); font-size: 12px; }
  .conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray); transition: background 0.2s; }
  .conn.connected .dot { background: var(--green); }
  .conn.running .dot { background: var(--amber); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .counts { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--fg-dim); }
  .counts .stat { display: flex; align-items: center; gap: 5px; }
  .counts b { color: var(--fg); font-weight: 600; font-variant-numeric: tabular-nums; }
  .counts .stat.passed b { color: var(--green); }
  .counts .stat.failed b { color: var(--red); }
  .counts .stat.flaky b { color: var(--orange); }
  .counts .stat.skipped b { color: var(--gray); }
  #run-duration { font-variant-numeric: tabular-nums; }
  #theme-toggle { flex: none; }
  #theme-toggle svg { width: 13px; height: 13px; }
  #progress {
    position: absolute;
    left: 0; bottom: -1px;
    height: 2px;
    width: 0;
    background: var(--accent);
    transition: width 0.25s ease;
    z-index: 5;
  }
  #progress.done { transition: width 0.25s ease, opacity 0.6s ease 0.4s; opacity: 0; }

  /* ── Reconnect banner ── */
  #banner {
    display: none;
    background: var(--danger-bg);
    color: var(--red);
    border-bottom: 1px solid var(--red);
    font-size: 12px;
    padding: 5px 16px;
    flex: none;
  }
  #banner.visible { display: block; }

  /* ── Layout ── */
  main { display: flex; flex: 1; min-height: 0; }
  #sidebar {
    width: 320px;
    min-width: 240px;
    max-width: 70vw;
    flex: none;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    min-height: 0;
  }
  #splitter { width: 5px; flex: none; cursor: col-resize; background: var(--border); opacity: 0.6; }
  #splitter:hover, #splitter.dragging { background: var(--accent); opacity: 1; }

  /* ── Sidebar toolbar ── */
  .toolbar { display: flex; flex-direction: column; gap: 8px; padding: 10px; border-bottom: 1px solid var(--border); flex: none; }
  .toolbar-row { display: flex; gap: 6px; align-items: center; }
  #run-status { margin-left: auto; font-size: 11px; color: var(--amber); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .search-wrap { position: relative; flex: 1; min-width: 0; }
  .search-wrap input {
    width: 100%;
    background: var(--bg-inset);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--fg);
    padding: 6px 26px 6px 9px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .hint {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: var(--fg-dim);
    border: 1px solid var(--border); border-radius: 3px; padding: 0 4px;
    pointer-events: none;
  }
  .chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 10px;
    border: 1px solid var(--border);
    color: var(--fg-dim);
    cursor: pointer;
    background: transparent;
    user-select: none;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--fg-mid); }
  .chip.on { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .chip .n { font-variant-numeric: tabular-nums; opacity: 0.8; margin-left: 4px; }

  /* ── Tree ── */
  #tree { flex: 1; overflow-y: auto; padding: 4px 0 12px; }
  #tree .empty { color: var(--fg-dim); font-size: 12px; padding: 18px 14px; text-align: center; }
  .suite { user-select: none; }
  .suite-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px 4px 8px;
    cursor: pointer;
    color: var(--fg-mid);
    white-space: nowrap;
  }
  .suite-head:hover { background: var(--bg-hover); }
  .suite-head .chev { width: 14px; flex: none; color: var(--fg-dim); font-size: 10px; transition: transform 0.12s; text-align: center; }
  .suite.collapsed .chev { transform: rotate(-90deg); }
  .suite-head .suite-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
  .suite-head .suite-file { font-size: 11px; color: var(--fg-dim); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .suite-head .suite-counts { font-size: 11px; color: var(--fg-dim); font-variant-numeric: tabular-nums; }
  .suite-head .run-one { visibility: hidden; }
  .suite-head:hover .run-one { visibility: visible; }
  .suite.collapsed .suite-body { display: none; }
  .test-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 8px 4px 28px;
    cursor: pointer;
    white-space: nowrap;
    border-left: 2px solid transparent;
  }
  .test-row:hover { background: var(--bg-hover); }
  .test-row.selected { background: var(--bg-active); border-left-color: var(--accent); }
  .test-row .title { flex: 1; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
  .test-row .dur { color: var(--fg-dim); font-size: 11px; font-variant-numeric: tabular-nums; }
  .run-one { padding: 1px 8px; font-size: 11px; border-radius: 4px; }
  .test-row .run-one { visibility: hidden; }
  .test-row:hover .run-one { visibility: visible; }

  /* ── Detail pane ── */
  #detail { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #detail-content { flex: 1 1 auto; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; }
  /* Viewer-first layout: the header/error/tabs strip takes its natural
     height (shrinking and scrolling only when it would starve the
     viewer) and the embedded trace viewer gets everything else. */
  #detail.viewer-on #detail-content { flex: 0 1 auto; }
  #viewer-host { flex: 1 1 auto; min-height: 240px; border-top: 1px solid var(--border); background: var(--bg-inset); }
  #viewer-host[hidden] { display: none; }
  #viewer-host iframe { width: 100%; height: 100%; border: 0; display: block; }
  #detail .placeholder {
    color: var(--fg-dim);
    margin: auto;
    text-align: center;
    font-size: 13px;
    line-height: 1.9;
    padding: 24px;
  }
  #detail .placeholder .mark { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  #detail .placeholder .mark svg { width: 28px; height: 28px; }
  #detail .placeholder .mark .name { font-size: 16px; font-weight: 650; color: var(--fg-mid); letter-spacing: 0.01em; }
  #detail .placeholder .keys { font-size: 12px; color: var(--gray); }
  #detail .placeholder kbd {
    font-family: var(--mono); font-size: 11px;
    border: 1px solid var(--border-strong); border-bottom-width: 2px;
    border-radius: 4px; padding: 0 5px; margin: 0 2px;
  }
  .detail-inner { padding: 14px 22px 32px; }
  #detail.viewer-on .detail-inner { padding-bottom: 0; }
  .detail-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .detail-head h2 { font-size: 15px; font-weight: 650; min-width: 0; overflow-wrap: anywhere; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    color: var(--fg-dim);
    white-space: nowrap;
  }
  .badge.passed { color: var(--green); border-color: var(--green); }
  .badge.failed, .badge.timed-out, .badge.interrupted { color: var(--red); border-color: var(--red); }
  .badge.flaky { color: var(--orange); border-color: var(--orange); }
  .badge.running { color: var(--amber); border-color: var(--amber); }
  .badge.skipped { color: var(--gray); border-color: var(--gray); }
  .filter-note {
    font-size: 11px;
    color: var(--amber);
    border: 1px dashed var(--amber);
    border-radius: 10px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .detail-actions { margin-left: auto; display: flex; gap: 6px; }
  .detail-file {
    color: var(--fg-dim);
    font-size: 12px;
    margin: 6px 0 12px;
    font-family: var(--mono);
  }
  .detail-meta { color: var(--fg-dim); font-size: 12px; margin-left: 2px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 2px; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .tabs .spacer { flex: 1; }
  .tabs .trace-link { color: var(--accent); font-size: 11px; text-decoration: none; white-space: nowrap; padding: 0 8px; }
  .tabs .trace-link:hover { text-decoration: underline; }
  #detail.viewer-on .tabs { margin-bottom: 0; }
  .tab {
    padding: 6px 14px;
    font-size: 12px;
    color: var(--fg-dim);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    border-radius: 0;
  }
  .tab:hover:not(:disabled) { color: var(--fg); border-color: transparent; border-bottom-color: var(--border-strong); }
  .tab.on, .tab.on:disabled { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .n {
    font-size: 10px; margin-left: 5px; padding: 0 5px;
    border-radius: 8px; background: var(--bg-active); color: var(--fg-mid);
  }

  pre.error-box {
    background: var(--bg-inset);
    border: 1px solid var(--error-border);
    border-radius: 6px;
    color: var(--red);
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    max-height: 30vh;
    overflow: auto;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    margin-bottom: 12px;
  }
  .section-empty { color: var(--fg-dim); font-size: 12px; padding: 10px 2px; }

  /* ── Attachments ── */
  .attachment {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 13px;
    background: var(--bg-panel);
  }
  .attachment .name { font-weight: 600; flex: none; }
  .attachment .ctype { color: var(--fg-dim); font-size: 11px; font-family: var(--mono); flex: none; }
  .attachment .path {
    color: var(--fg-dim);
    font-family: var(--mono);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .attachment a { color: var(--accent); font-size: 12px; text-decoration: none; white-space: nowrap; }
  .attachment a:hover { text-decoration: underline; }
  .attachment img.preview {
    max-height: 48px;
    max-width: 120px;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
  }

  /* ── Output ── */
  pre.output-box {
    background: var(--bg-inset);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg-mid);
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    margin-bottom: 12px;
  }
  .output-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-dim); margin: 0 0 5px 2px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--accent)" stroke-width="1.8"/><circle cx="8" cy="8" r="2.4" fill="var(--accent)"/></svg>
    <h1>ferridriver</h1>
    <span class="mode">UI mode</span>
  </div>
  <span class="conn" id="conn"><span class="dot"></span><span id="conn-text">connecting</span></span>
  <div class="counts">
    <span class="stat passed">passed <b id="count-passed">0</b></span>
    <span class="stat failed">failed <b id="count-failed">0</b></span>
    <span class="stat flaky">flaky <b id="count-flaky">0</b></span>
    <span class="stat skipped">skipped <b id="count-skipped">0</b></span>
    <span class="stat">total <b id="count-total">0</b></span>
    <span id="run-duration"></span>
  </div>
  <button id="theme-toggle" class="subtle" title="Theme"><span id="theme-icon"></span><span id="theme-label">Auto</span></button>
  <div id="progress"></div>
</header>
<div id="banner">Connection to the ferridriver UI server lost. Reconnecting…</div>
<main>
  <div id="sidebar">
    <div class="toolbar">
      <div class="toolbar-row">
        <button id="run-all" class="primary" title="Run every test (F5, Ctrl+Shift+Enter)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5 3.2v9.6L12.8 8z" fill="currentColor"/></svg>Run all</button>
        <button id="run-failed" title="Re-run tests recorded as failed in the last run"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M12.9 6.4A5.1 5.1 0 1 0 13.1 9.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M13.4 2.6v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Run failed</button>
        <button id="stop" class="danger" title="Stop the current run (Shift+F5)" disabled><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" rx="1.5" fill="currentColor"/></svg>Stop</button>
        <span id="run-status"></span>
      </div>
      <div class="toolbar-row">
        <div class="search-wrap">
          <input id="filter" type="text" placeholder="Filter tests — Enter runs shown" autocomplete="off" spellcheck="false">
          <span class="hint">/</span>
        </div>
      </div>
      <div class="chips" id="chips">
        <span class="chip on" data-chip="all">All<span class="n" id="chip-all-n"></span></span>
        <span class="chip" data-chip="failed">Failed<span class="n" id="chip-failed-n"></span></span>
        <span class="chip" data-chip="passed">Passed<span class="n" id="chip-passed-n"></span></span>
        <span class="chip" data-chip="skipped">Skipped<span class="n" id="chip-skipped-n"></span></span>
        <span class="chip" data-chip="idle">Not run<span class="n" id="chip-idle-n"></span></span>
      </div>
    </div>
    <div id="tree"></div>
  </div>
  <div id="splitter"></div>
  <div id="detail">
    <div id="detail-content"></div>
    <!-- Persistent iframe: rebuilt detail renders never touch it, so an
         unrelated websocket message cannot reload the viewer. -->
    <div id="viewer-host" hidden><iframe id="trace-frame" title="Trace viewer"></iframe></div>
  </div>
</main>
<script>
"use strict";

/* ── State ── */
const state = {
  suites: [],
  tests: new Map(),
  selected: null,
  filter: "",
  statusChip: "all",
  collapsed: new Set(),
  // running mirrors the server's watchStatus; runActive spans
  // runStarted..runFinished/runCancelled. Either means "busy".
  running: false,
  runActive: false,
  connected: false,
  lastTotals: null,
  progress: { total: 0, done: 0 },
  // Failure auto-follow: the first failure of a run (in tree order) is
  // revealed once; userPinned (a manual pick during the run) stops it.
  userPinned: false,
  autoRevealedId: null,
  tabPref: new Map(),
};
let ws = null;

/* ── Helpers ── */
const $ = (id) => document.getElementById(id);

function send(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(cmd));
}

function isBusy() {
  return state.running || state.runActive;
}

function runCmd(cmd) {
  if (!state.connected || isBusy()) return;
  send(cmd);
}

function isFailedStatus(status) {
  return status === "failed" || status === "timed out" || status === "interrupted";
}

function formatMs(ms) {
  if (ms == null) return "";
  if (ms < 1000) return ms + "ms";
  if (ms < 60000) return (ms / 1000).toFixed(1) + "s";
  const m = Math.floor(ms / 60000);
  return m + "m " + Math.round((ms % 60000) / 1000) + "s";
}

function regexEscape(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function ensureTest(id) {
  let test = state.tests.get(id);
  if (!test) {
    test = { id, title: id, file: "", status: "idle", outcome: null, liveTraceUrl: null };
    state.tests.set(id, test);
  }
  return test;
}

/* ── Theme ──
   Three-way toggle persisted in localStorage: auto (follows the OS via
   the prefers-color-scheme media block) / light / dark. */
const THEME_KEY = "fd-ui-theme";
const darkQuery = window.matchMedia("(prefers-color-scheme: dark)");
let themePref = (() => {
  try {
    const stored = localStorage.getItem(THEME_KEY);
    return stored === "light" || stored === "dark" ? stored : "auto";
  } catch (_) { return "auto"; }
})();

function effectiveTheme() {
  return themePref === "auto" ? (darkQuery.matches ? "dark" : "light") : themePref;
}

/* The embedded trace viewer reads localStorage["theme"] once at module
   load (served same-origin from /trace-viewer/, so this shell's
   localStorage IS the viewer's) and afterwards is themed by the
   dark-mode / light-mode class on its documentElement. Keep both in
   sync with the app theme so loads AND live toggles follow it. */
function syncViewerTheme() {
  const eff = effectiveTheme();
  try { localStorage.setItem("theme", eff === "dark" ? "dark-mode" : "light-mode"); } catch (_) { /* private mode */ }
  const doc = $("trace-frame").contentDocument;
  if (doc && doc.documentElement) {
    doc.documentElement.classList.toggle("dark-mode", eff === "dark");
    doc.documentElement.classList.toggle("light-mode", eff === "light");
  }
}

const THEME_ICONS = {
  auto: '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="5.4" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 2.6a5.4 5.4 0 0 1 0 10.8z" fill="currentColor"/></svg>',
  light: '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 1.2v2M8 12.8v2M1.2 8h2M12.8 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M12.8 3.2l-1.4 1.4M4.6 11.4l-1.4 1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
  dark: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M13.4 9.6A5.8 5.8 0 0 1 6.4 2.6a5.8 5.8 0 1 0 7 7z" fill="currentColor"/></svg>',
};

function applyTheme() {
  if (themePref === "auto") delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme = themePref;
  syncViewerTheme();
  const label = themePref === "auto" ? "Auto" : themePref === "light" ? "Light" : "Dark";
  $("theme-label").textContent = label;
  $("theme-icon").innerHTML = THEME_ICONS[themePref];
  $("theme-toggle").title = "Theme: " + label.toLowerCase() + " (click to change)";
}

$("theme-toggle").onclick = () => {
  themePref = themePref === "auto" ? "light" : themePref === "light" ? "dark" : "auto";
  try { localStorage.setItem(THEME_KEY, themePref); } catch (_) { /* private mode */ }
  applyTheme();
};
darkQuery.addEventListener("change", () => { if (themePref === "auto") applyTheme(); });

/* ── Status icons ── */
const ICON_SVG = {
  idle: '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="5.2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>',
  running: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.6a5.4 5.4 0 1 1-5.4 5.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  passed: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.4 8.6l3.1 3.1 6.1-6.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  failed: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4.6 4.6l6.8 6.8m0-6.8l-6.8 6.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  skipped: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4.5 8h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  flaky: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3.1v5.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="8" cy="12" r="1.15" fill="currentColor"/></svg>',
};

function statusKey(status) {
  if (isFailedStatus(status)) return "failed";
  if (status === "running" || status === "passed" || status === "skipped" || status === "flaky") return status;
  return "idle";
}

function makeStatusIcon(status) {
  const key = statusKey(status);
  const span = document.createElement("span");
  span.className = "sicon s-" + key;
  span.innerHTML = ICON_SVG[key];
  span.title = status;
  return span;
}

/* ── Message handling ── */
function onTestList(msg) {
  const seen = new Set();
  state.suites = msg.suites.map((suite) => ({
    title: suite.title,
    file: suite.file,
    testIds: suite.tests.map((entry) => {
      seen.add(entry.id);
      const test = ensureTest(entry.id);
      test.title = entry.title;
      test.file = entry.file;
      test.status = entry.status;
      return entry.id;
    }),
  }));
  for (const id of Array.from(state.tests.keys())) {
    if (!seen.has(id)) { state.tests.delete(id); state.tabPref.delete(id); }
  }
  if (state.selected && !state.tests.has(state.selected)) state.selected = null;
  renderAll();
}

function treeOrderIds() {
  const ids = [];
  for (const suite of state.suites) for (const id of suite.testIds) ids.push(id);
  return ids;
}

function onMessage(msg) {
  switch (msg.type) {
    case "testList":
      onTestList(msg);
      break;
    case "watchStatus": {
      state.running = msg.status === "running";
      if (!state.running) {
        state.runActive = false;
        for (const test of state.tests.values()) {
          if (test.status === "running") { test.status = "idle"; updateRow(test.id); }
        }
        finishProgress();
        if (state.selected) renderDetail();
      }
      renderConn();
      renderCounts();
      renderRunControls();
      break;
    }
    case "runStarted":
      state.progress = { total: msg.totalTests || 0, done: 0 };
      state.runActive = true;
      state.userPinned = false;
      state.autoRevealedId = null;
      renderProgress();
      renderRunControls();
      break;
    case "testStarted": {
      const test = ensureTest(msg.id);
      test.status = "running";
      test.outcome = null;
      // Live-trace snapshot endpoint the viewer polls while running.
      test.liveTraceUrl = msg.liveTraceUrl || null;
      updateRow(msg.id);
      renderCounts();
      if (state.selected === msg.id) renderDetail();
      break;
    }
    // stepStarted / stepFinished are still emitted (other reporters use
    // them) but the trace viewer's Actions panel is the step list now,
    // so these events are ignored here.
    case "testFinished": {
      const test = ensureTest(msg.id);
      test.status = msg.outcome.status;
      test.outcome = msg.outcome;
      // Replayed outcomes on reconnect arrive outside a run — they must
      // not advance the progress bar or trigger the failure follow.
      if (state.runActive) {
        state.progress.done += 1;
        renderProgress();
      }
      updateRow(msg.id);
      renderCounts();
      if (state.runActive && !state.userPinned && isFailedStatus(test.status)) {
        // Reveal the first failure in TREE order and stay: only take a
        // later-landing failure when it sits above the revealed one and
        // the reveal is still the active selection.
        const order = treeOrderIds();
        const reveal = !state.autoRevealedId
          || (state.selected === state.autoRevealedId
              && order.indexOf(msg.id) < order.indexOf(state.autoRevealedId));
        if (reveal) {
          state.autoRevealedId = msg.id;
          selectTest(msg.id, false);
        } else if (state.selected === msg.id) {
          renderDetail();
        }
      } else if (state.selected === msg.id) {
        renderDetail();
      }
      break;
    }
    case "runFinished":
      state.runActive = false;
      state.lastTotals = msg.totals;
      finishProgress();
      renderCounts();
      renderRunControls();
      break;
    case "runCancelled":
      // No runFinished follows a stop: reset run state but keep the
      // previous completed run's totals in the header.
      state.runActive = false;
      state.progress = { total: 0, done: 0 };
      for (const test of state.tests.values()) {
        if (test.status === "running") { test.status = "idle"; updateRow(test.id); }
      }
      $("progress").style.width = "0";
      renderCounts();
      renderRunControls();
      if (state.selected) renderDetail();
      break;
    default:
      break;
  }
}

/* ── WebSocket ── */
function connect() {
  ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.onopen = () => {
    state.connected = true;
    $("banner").classList.remove("visible");
    renderConn();
    renderRunControls();
  };
  ws.onmessage = (event) => {
    try { onMessage(JSON.parse(event.data)); } catch (_) { /* ignore malformed frames */ }
  };
  ws.onclose = () => {
    state.connected = false;
    state.running = false;
    state.runActive = false;
    $("banner").classList.add("visible");
    renderConn();
    renderRunControls();
    setTimeout(connect, 1000);
  };
  ws.onerror = () => ws.close();
}

/* ── Rendering ── */
function renderAll() {
  renderTree();
  renderCounts();
  renderConn();
  renderRunControls();
  renderDetail();
}

function renderConn() {
  const conn = $("conn");
  conn.className = "conn" + (state.connected ? " connected" : "") + (isBusy() ? " running" : "");
  $("conn-text").textContent = !state.connected ? "disconnected" : isBusy() ? "running" : "watching";
}

function renderRunControls() {
  const blocked = !state.connected || isBusy();
  $("run-all").disabled = blocked;
  $("run-failed").disabled = blocked;
  $("stop").disabled = !state.connected || !isBusy();
  for (const btn of document.querySelectorAll(".run-one")) btn.disabled = blocked;
  const detailRun = $("detail-content").querySelector(".detail-actions button");
  if (detailRun) detailRun.disabled = blocked;
  renderRunStatus();
}

function renderRunStatus() {
  $("run-status").textContent = !isBusy() ? ""
    : state.progress.total ? "Running " + state.progress.done + "/" + state.progress.total
    : "Running";
}

function countBy() {
  const counts = { all: 0, passed: 0, failed: 0, flaky: 0, skipped: 0, notRun: 0 };
  for (const test of state.tests.values()) {
    counts.all += 1;
    if (test.status === "passed") counts.passed += 1;
    else if (isFailedStatus(test.status)) counts.failed += 1;
    else if (test.status === "flaky") counts.flaky += 1;
    else if (test.status === "skipped") counts.skipped += 1;
    else counts.notRun += 1;
  }
  return counts;
}

function renderCounts() {
  const counts = countBy();
  $("count-passed").textContent = counts.passed;
  $("count-failed").textContent = counts.failed;
  $("count-flaky").textContent = counts.flaky;
  $("count-skipped").textContent = counts.skipped;
  $("count-total").textContent = counts.all;
  $("run-duration").textContent = state.lastTotals ? "last run " + formatMs(state.lastTotals.durationMs) : "";
  $("chip-all-n").textContent = counts.all || "";
  $("chip-failed-n").textContent = counts.failed + counts.flaky || "";
  $("chip-passed-n").textContent = counts.passed || "";
  $("chip-skipped-n").textContent = counts.skipped || "";
  $("chip-idle-n").textContent = counts.notRun || "";
}

function renderProgress() {
  const bar = $("progress");
  const { total, done } = state.progress;
  renderRunStatus();
  if (!total) { bar.style.width = "0"; return; }
  bar.classList.remove("done");
  bar.style.opacity = "1";
  bar.style.width = Math.min(100, (done / total) * 100) + "%";
}

function finishProgress() {
  const bar = $("progress");
  bar.style.width = "100%";
  bar.classList.add("done");
  setTimeout(() => { bar.style.width = "0"; bar.classList.remove("done"); bar.style.opacity = "1"; }, 1100);
  renderRunStatus();
}

function chipMatches(test) {
  switch (state.statusChip) {
    case "failed": return isFailedStatus(test.status) || test.status === "flaky";
    case "passed": return test.status === "passed";
    case "skipped": return test.status === "skipped";
    case "idle": return test.status === "idle" || test.status === "running";
    default: return true;
  }
}

function matchesFilter(test) {
  if (!chipMatches(test)) return false;
  if (!state.filter) return true;
  return test.id.toLowerCase().includes(state.filter.toLowerCase());
}

/* Filter-matching tests regardless of suite collapse: collapse is a view
   state, not a filter, so Enter-to-run includes collapsed suites. */
function filteredTestIds() {
  const ids = [];
  for (const suite of state.suites) {
    for (const id of suite.testIds) {
      const test = state.tests.get(id);
      if (test && matchesFilter(test)) ids.push(id);
    }
  }
  return ids;
}

/* Rows on screen (collapsed suites excluded) — keyboard navigation order. */
function visibleTestIds() {
  const ids = [];
  for (const suite of state.suites) {
    if (state.collapsed.has(suite.file)) continue;
    for (const id of suite.testIds) {
      const test = state.tests.get(id);
      if (test && matchesFilter(test)) ids.push(id);
    }
  }
  return ids;
}

function suiteOfTest(id) {
  return state.suites.find((suite) => suite.testIds.includes(id)) || null;
}

function suiteRollupStatus(tests) {
  if (tests.some((t) => isFailedStatus(t.status))) return "failed";
  if (tests.some((t) => t.status === "running")) return "running";
  if (tests.length && tests.every((t) => t.status === "passed")) return "passed";
  return "idle";
}

function suiteCountsText(tests) {
  const passed = tests.filter((t) => t.status === "passed").length;
  return passed + "/" + tests.length;
}

function renderTree() {
  const tree = $("tree");
  tree.textContent = "";
  const blocked = !state.connected || isBusy();
  let anyVisible = false;

  for (const suite of state.suites) {
    const visible = suite.testIds.map((id) => state.tests.get(id)).filter((t) => t && matchesFilter(t));
    if (!visible.length) continue;
    anyVisible = true;

    const suiteEl = document.createElement("div");
    suiteEl.className = "suite" + (state.collapsed.has(suite.file) ? " collapsed" : "");

    const head = document.createElement("div");
    head.className = "suite-head";
    head.dataset.file = suite.file;
    const chev = document.createElement("span");
    chev.className = "chev";
    chev.textContent = "▼";
    const icon = makeStatusIcon(suiteRollupStatus(visible));
    const name = document.createElement("span");
    name.className = "suite-name";
    name.textContent = suite.title || suite.file;
    const file = document.createElement("span");
    file.className = "suite-file";
    file.textContent = suite.file;
    file.title = suite.file;
    const counts = document.createElement("span");
    counts.className = "suite-counts";
    counts.textContent = suiteCountsText(visible);
    counts.title = "passed / total";
    const run = document.createElement("button");
    run.className = "run-one subtle";
    run.textContent = "Run";
    run.title = "Run this feature file";
    run.disabled = blocked;
    run.onclick = (event) => {
      event.stopPropagation();
      runCmd({ cmd: "runFile", file: suite.file });
    };
    head.append(chev, icon, name, file, counts, run);
    head.onclick = () => {
      if (state.collapsed.has(suite.file)) state.collapsed.delete(suite.file);
      else state.collapsed.add(suite.file);
      renderTree();
    };
    suiteEl.appendChild(head);

    const body = document.createElement("div");
    body.className = "suite-body";
    for (const test of visible) {
      const row = document.createElement("div");
      row.className = "test-row" + (state.selected === test.id ? " selected" : "");
      row.dataset.id = test.id;
      const dot = makeStatusIcon(test.status);
      const label = document.createElement("span");
      label.className = "title";
      label.textContent = test.title;
      label.title = test.id;
      const dur = document.createElement("span");
      dur.className = "dur";
      dur.textContent = test.outcome ? formatMs(test.outcome.durationMs) : "";
      const runOne = document.createElement("button");
      runOne.className = "run-one subtle";
      runOne.textContent = "Run";
      runOne.title = "Run this test";
      runOne.disabled = blocked;
      runOne.onclick = (event) => {
        event.stopPropagation();
        // Running a test selects it so its (live) trace shows — matches
        // Playwright's runTreeItem. Not a manual pin (byUser=false).
        selectTest(test.id, false);
        runCmd({ cmd: "runTest", id: test.id });
      };
      row.append(dot, label, dur, runOne);
      row.onclick = () => selectTest(test.id);
      body.appendChild(row);
    }
    suiteEl.appendChild(body);
    tree.appendChild(suiteEl);
  }

  if (!anyVisible) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = state.tests.size
      ? "No tests match the current filter."
      : "No scenarios discovered yet. Save a feature file to refresh.";
    tree.appendChild(empty);
  }
}

function updateSuiteHead(file) {
  const head = document.querySelector('.suite-head[data-file="' + CSS.escape(file) + '"]');
  const suite = state.suites.find((s) => s.file === file);
  if (!head || !suite) return;
  const visible = suite.testIds.map((id) => state.tests.get(id)).filter((t) => t && matchesFilter(t));
  const icon = head.querySelector(".sicon");
  if (icon) icon.replaceWith(makeStatusIcon(suiteRollupStatus(visible)));
  const counts = head.querySelector(".suite-counts");
  if (counts) counts.textContent = suiteCountsText(visible);
}

function updateRow(id) {
  const test = state.tests.get(id);
  if (!test) return;
  const row = document.querySelector('.test-row[data-id="' + CSS.escape(id) + '"]');
  if (!row || !matchesFilter(test)) {
    // Row absent, or a status change moved it in/out of the current
    // filter — rebuild (which also refreshes suite heads).
    renderTree();
    return;
  }
  row.querySelector(".sicon").replaceWith(makeStatusIcon(test.status));
  row.querySelector(".dur").textContent = test.outcome ? formatMs(test.outcome.durationMs) : "";
  const suite = suiteOfTest(id);
  if (suite) updateSuiteHead(suite.file);
}

/* Select a test and show its detail/trace. `byUser` is true for an
   explicit pick (row click, arrow nav) — during a run that pins the
   selection so the failure auto-follow stops fighting the user
   (Playwright's `itemSelectedByUser`). Run actions and the auto-follow
   itself pass `byUser=false`. */
function selectTest(id, byUser = true) {
  if (byUser && isBusy()) state.userPinned = true;
  state.selected = id;
  document.querySelectorAll(".test-row.selected").forEach((el) => el.classList.remove("selected"));
  const row = document.querySelector('.test-row[data-id="' + CSS.escape(id) + '"]');
  if (row) {
    row.classList.add("selected");
    row.scrollIntoView({ block: "nearest" });
  }
  renderDetail();
}

/* ── Detail pane ──
   Playwright-UI-mode model: the embedded trace viewer IS the pane. It is
   live WHILE the test runs (the viewer stays mounted; the shell polls a
   live-trace snapshot endpoint and feeds each zip in via the viewer's
   postMessage `load` hook, so actions / snapshots / filmstrip update
   without an iframe reload) and loads the finished trace when the test
   completes. There is no separate Steps list — the viewer's own Actions
   panel is the step list. Attachments / Output are slim secondary tabs;
   the trace Download / trace.playwright.dev links live in the tab strip.
   Untraced / not-yet-run tests show a placeholder. */

function effectiveTab(test, viewerAvailable, hasAttachments, hasOutput) {
  const pref = state.tabPref.get(test.id) || "trace";
  const available = { trace: viewerAvailable, attachments: hasAttachments, output: hasOutput };
  if (available[pref]) return pref;
  if (available.trace) return "trace";
  if (available.attachments) return "attachments";
  if (available.output) return "output";
  return "trace";
}

function renderDetail() {
  const content = $("detail-content");
  content.textContent = "";
  const test = state.selected ? state.tests.get(state.selected) : null;

  if (!test) {
    stopLivePoll();
    showViewer(false);
    const placeholder = document.createElement("div");
    placeholder.className = "placeholder";
    const mark = document.createElement("div");
    mark.className = "mark";
    mark.innerHTML = '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--accent)" stroke-width="1.6"/><circle cx="8" cy="8" r="2.4" fill="var(--accent)"/></svg><span class="name">ferridriver</span>';
    const line1 = document.createElement("div");
    line1.textContent = "Select a test to watch its trace live and inspect it after it finishes.";
    const keys = document.createElement("div");
    keys.className = "keys";
    keys.innerHTML = "<kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate &nbsp; <kbd>Enter</kbd> run selected &nbsp; <kbd>/</kbd> filter";
    const keys2 = document.createElement("div");
    keys2.className = "keys";
    keys2.innerHTML = "<kbd>F5</kbd> run all &nbsp; <kbd>Shift</kbd>+<kbd>F5</kbd> stop &nbsp; <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Enter</kbd> run all";
    placeholder.append(mark, line1, keys, keys2);
    content.appendChild(placeholder);
    return;
  }

  const attachments = attachmentsOf(test);
  const traceAttachment = attachments.find((a) => a.name === "trace" && a.urlPath) || null;
  // Live while running (a live-trace URL was announced); finished trace
  // once the test completes. Either yields the viewer.
  const liveMode = test.status === "running" && !!test.liveTraceUrl;
  const finishedTrace = test.status !== "running" ? traceAttachment : null;
  const viewerAvailable = liveMode || !!finishedTrace;
  const hasOutput = !!(test.outcome && (test.outcome.stdout || test.outcome.stderr));
  const activeTab = effectiveTab(test, viewerAvailable, attachments.length > 0, hasOutput);

  const inner = document.createElement("div");
  inner.className = "detail-inner";

  const head = document.createElement("div");
  head.className = "detail-head";
  const title = document.createElement("h2");
  title.textContent = test.title;
  const badge = document.createElement("span");
  badge.className = "badge " + String(test.status).replace(/\s+/g, "-");
  badge.textContent = test.status;
  const meta = document.createElement("span");
  meta.className = "detail-meta";
  if (test.outcome) {
    meta.textContent = formatMs(test.outcome.durationMs)
      + (test.outcome.attempt > 1 ? " (attempt " + test.outcome.attempt + ")" : "");
  }
  head.append(title, badge, meta);
  if (!matchesFilter(test)) {
    const note = document.createElement("span");
    note.className = "filter-note";
    note.textContent = "hidden by filter";
    note.title = "The selected test's row is hidden by the current status/text filter.";
    head.appendChild(note);
  }
  const actions = document.createElement("div");
  actions.className = "detail-actions";
  const runBtn = document.createElement("button");
  runBtn.className = "primary";
  runBtn.textContent = "Run test";
  runBtn.disabled = !state.connected || isBusy();
  runBtn.onclick = () => runCmd({ cmd: "runTest", id: test.id });
  actions.appendChild(runBtn);
  head.appendChild(actions);
  inner.appendChild(head);

  const file = document.createElement("div");
  file.className = "detail-file";
  file.textContent = test.file;
  inner.appendChild(file);

  // Errors banner stays above the viewer.
  if (test.outcome && test.outcome.error) {
    const pre = document.createElement("pre");
    pre.className = "error-box";
    pre.textContent = test.outcome.error;
    inner.appendChild(pre);
  }

  const tabDefs = [
    { key: "trace", label: liveMode ? "Trace (live)" : "Trace", count: null, enabled: viewerAvailable },
    { key: "attachments", label: "Attachments", count: attachments.length, enabled: attachments.length > 0 },
    { key: "output", label: "Output", count: null, enabled: hasOutput },
  ];
  const tabs = document.createElement("div");
  tabs.className = "tabs";
  for (const def of tabDefs) {
    const tab = document.createElement("button");
    tab.className = "tab" + (activeTab === def.key ? " on" : "");
    tab.textContent = def.label;
    if (def.count) {
      const n = document.createElement("span");
      n.className = "n";
      n.textContent = def.count;
      tab.appendChild(n);
    }
    tab.disabled = !def.enabled;
    tab.onclick = () => {
      state.tabPref.set(test.id, def.key);
      renderDetail();
    };
    tabs.appendChild(tab);
  }
  // Download / trace.playwright.dev links only for a finished trace file.
  if (finishedTrace) {
    const spacer = document.createElement("span");
    spacer.className = "spacer";
    tabs.appendChild(spacer);
    const download = document.createElement("a");
    download.className = "trace-link";
    download.href = finishedTrace.urlPath;
    download.setAttribute("download", "");
    download.textContent = "Download trace";
    const online = document.createElement("a");
    online.className = "trace-link";
    online.href = onlineTraceViewerUrl(finishedTrace);
    online.target = "_blank";
    online.rel = "noopener";
    online.textContent = "trace.playwright.dev";
    tabs.append(download, online);
  }
  inner.appendChild(tabs);

  const viewerActive = viewerAvailable && activeTab === "trace";
  if (activeTab === "attachments") renderAttachmentsTab(inner, attachments);
  else if (activeTab === "output") renderOutputTab(inner, test);
  else if (activeTab === "trace" && !viewerAvailable) {
    const empty = document.createElement("div");
    empty.className = "section-empty";
    empty.textContent = test.status === "idle"
      ? "This test has not run yet. Press Run test to record a trace."
      : "No trace was recorded for this test.";
    inner.appendChild(empty);
  }

  content.appendChild(inner);
  // Drive the viewer: live poll while running, finished zip once done.
  if (viewerActive && liveMode) {
    startLivePoll(test);
  } else {
    stopLivePoll();
    if (viewerActive) loadFinishedViewer(test, finishedTrace);
  }
  showViewer(viewerActive);
}

function attachmentsOf(test) {
  return (test.outcome && test.outcome.attachments) || [];
}

function onlineTraceViewerUrl(attachment) {
  return "https://trace.playwright.dev/?trace=" + encodeURIComponent(location.origin + attachment.urlPath);
}

/* ── Embedded trace viewer ── */

function showViewer(visible) {
  $("viewer-host").hidden = !visible;
  $("detail").classList.toggle("viewer-on", visible);
}

/* Point the persistent iframe at a finished trace zip (SW loads it). The
   ?v cache-buster (durationMs-attempt) changes on every re-run, so a
   fresh outcome reloads the viewer while unrelated re-renders leave it
   untouched. Marks the iframe 'finished' so the live path knows to
   re-navigate when switching back to a running test. */
function loadFinishedViewer(test, traceAttachment) {
  const frame = $("trace-frame");
  const buster = test.outcome ? test.outcome.durationMs + "-" + test.outcome.attempt : "0";
  const src = "/trace-viewer/index.html?trace="
    + encodeURIComponent(location.origin + traceAttachment.urlPath + "?v=" + buster);
  if (frame.dataset.src !== src) {
    frame.dataset.src = src;
    frame.dataset.mode = "finished";
    frame.src = src;
  }
}

/* Live trace: the viewer stays mounted as the bare WorkbenchLoader (no
   ?trace), and we feed it fresh trace zips via its postMessage `load`
   hook. Each blob is a distinct object URL, so the viewer's service
   worker re-reads it (it caches models by URL) — that is how updates
   land without an iframe reload. Playwright's own smooth incremental
   live needs its websocket test-server (uiMode); this snapshot-feed is
   the equivalent the standalone viewer supports. */
let livePoll = null; // { url, testId, timer, lastLen, lastBlob }

function ensureLiveViewer() {
  const frame = $("trace-frame");
  if (frame.dataset.mode !== "live") {
    frame.dataset.mode = "live";
    frame.dataset.src = "";
    frame.src = "/trace-viewer/index.html";
  }
}

function postTraceBlob(blob) {
  const frame = $("trace-frame");
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ method: "load", params: { trace: blob } }, location.origin);
  }
}

function startLivePoll(test) {
  ensureLiveViewer();
  if (livePoll && livePoll.testId === test.id && livePoll.url === test.liveTraceUrl) return;
  stopLivePoll();
  livePoll = { url: test.liveTraceUrl, testId: test.id, timer: null, lastLen: -1, lastBlob: null };
  const tick = async () => {
    if (!livePoll) return;
    try {
      const res = await fetch(livePoll.url, { cache: "no-store" });
      if (res.ok) {
        const buf = await res.arrayBuffer();
        // Only re-feed the viewer when the trace actually grew, to avoid
        // needless model rebuilds (which reset the viewer's selection).
        if (buf.byteLength !== livePoll.lastLen) {
          livePoll.lastLen = buf.byteLength;
          livePoll.lastBlob = new Blob([buf], { type: "application/zip" });
          postTraceBlob(livePoll.lastBlob);
        }
      }
    } catch (_) { /* server gone / between-poll teardown */ }
    if (livePoll) livePoll.timer = setTimeout(tick, 800);
  };
  tick();
}

function stopLivePoll() {
  if (livePoll && livePoll.timer) clearTimeout(livePoll.timer);
  livePoll = null;
}

/* Blend the viewer into the app: hide its own Playwright-branded header
   so the workbench reads as our main pane. Same-origin iframe, styled
   via the viewer's source-defined stable class
   (.workbench-loader-header) — never build-hashed ones. Runs on each
   iframe navigation (live vs finished); postMessage model swaps do NOT
   reload the document, so the injected style persists across them. */
function blendViewerChrome(doc) {
  const style = doc.createElement("style");
  style.textContent = ".workbench-loader-header { display: none; }";
  doc.head.appendChild(style);
}

$("trace-frame").addEventListener("load", () => {
  const frame = $("trace-frame");
  const doc = frame.contentDocument;
  if (!doc) return;
  blendViewerChrome(doc);
  syncViewerTheme();
  // Live viewer just navigated to the bare loader — feed it the latest
  // snapshot now that its postMessage listener is mounted (the poll that
  // fired during navigation was dropped).
  if (frame.dataset.mode === "live" && livePoll && livePoll.lastBlob) {
    postTraceBlob(livePoll.lastBlob);
  }
  /* Focus model: while a viewer widget (action list, tabs) has focus,
     the viewer owns every key — its own arrow-key navigation keeps
     working. Only keys that land on the iframe's body (nothing focused
     inside the viewer, e.g. after clicking dead space) forward to the
     sidebar so test navigation never goes dead. */
  frame.contentWindow.addEventListener("keydown", (event) => {
    if (event.defaultPrevented) return;
    if (event.target !== doc.body && event.target !== doc.documentElement) return;
    if (event.key === "ArrowDown" || event.key === "ArrowUp") {
      event.preventDefault();
      navigateSidebar(event.key === "ArrowDown" ? 1 : -1);
    }
  });
});

function renderAttachmentsTab(container, attachments) {
  for (const attachment of attachments) {
    const row = document.createElement("div");
    row.className = "attachment";
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = attachment.name;
    const ctype = document.createElement("span");
    ctype.className = "ctype";
    ctype.textContent = attachment.contentType || "";
    const path = document.createElement("span");
    path.className = "path";
    path.textContent = attachment.path || "";
    path.title = attachment.path || "";
    row.append(name, ctype, path);
    if (attachment.urlPath) {
      if ((attachment.contentType || "").startsWith("image/")) {
        const img = document.createElement("img");
        img.className = "preview";
        img.src = attachment.urlPath;
        img.loading = "lazy";
        row.appendChild(img);
      }
      const download = document.createElement("a");
      download.href = attachment.urlPath;
      download.textContent = "Download";
      download.setAttribute("download", "");
      row.appendChild(download);
    }
    container.appendChild(row);
  }
}

function renderOutputTab(container, test) {
  const outcome = test.outcome || {};
  for (const [label, text] of [["stdout", outcome.stdout], ["stderr", outcome.stderr]]) {
    if (!text) continue;
    const heading = document.createElement("div");
    heading.className = "output-label";
    heading.textContent = label;
    const pre = document.createElement("pre");
    pre.className = "output-box";
    pre.textContent = text;
    container.append(heading, pre);
  }
}

/* ── Toolbar / keyboard ── */
$("run-all").onclick = () => runCmd({ cmd: "runAll" });
$("run-failed").onclick = () => runCmd({ cmd: "runFailed" });
$("stop").onclick = () => send({ cmd: "stop" });

/* Enter in the filter runs exactly the tests matching the sidebar filter:
   the server's runGrep pattern is a REGEX while the sidebar filter is a
   substring match, so the raw text would diverge — instead build an
   anchored regex-escaped alternation of the matching test ids. */
function runFiltered() {
  if (!state.connected || isBusy()) return;
  const ids = filteredTestIds();
  if (!ids.length) return;
  if (ids.length > 200 && !state.filter && state.statusChip === "all") {
    send({ cmd: "runAll" });
    return;
  }
  send({ cmd: "runGrep", pattern: "^(" + ids.map(regexEscape).join("|") + ")$" });
}

$("filter").oninput = (event) => {
  state.filter = event.target.value.trim();
  renderTree();
  if (state.selected) renderDetail();
};
$("filter").onkeydown = (event) => {
  if (event.key === "Enter") runFiltered();
  if (event.key === "Escape") {
    event.target.value = "";
    state.filter = "";
    renderTree();
    if (state.selected) renderDetail();
    event.target.blur();
  }
};
for (const chip of document.querySelectorAll(".chip")) {
  chip.onclick = () => {
    state.statusChip = chip.dataset.chip;
    document.querySelectorAll(".chip").forEach((c) => c.classList.toggle("on", c === chip));
    renderTree();
    if (state.selected) renderDetail();
  };
}

function navigateSidebar(direction) {
  const visible = visibleTestIds();
  if (!visible.length) return;
  const index = visible.indexOf(state.selected);
  if (index !== -1) {
    const next = direction > 0
      ? visible[Math.min(index + 1, visible.length - 1)]
      : visible[Math.max(index - 1, 0)];
    selectTest(next);
    return;
  }
  if (!state.selected) {
    selectTest(direction > 0 ? visible[0] : visible[visible.length - 1]);
    return;
  }
  // Selection is filtered out: anchor on the nearest visible row in tree
  // order so arrows keep working from where the user last was.
  const order = treeOrderIds();
  const position = order.indexOf(state.selected);
  const visibleSet = new Set(visible);
  if (direction > 0) {
    for (let i = position + 1; i < order.length; i++) {
      if (visibleSet.has(order[i])) { selectTest(order[i]); return; }
    }
    selectTest(visible[visible.length - 1]);
  } else {
    for (let i = position - 1; i >= 0; i--) {
      if (visibleSet.has(order[i])) { selectTest(order[i]); return; }
    }
    selectTest(visible[0]);
  }
}

document.addEventListener("keydown", (event) => {
  if (event.key === "F5") {
    event.preventDefault();
    if (event.shiftKey) {
      if (state.connected && isBusy()) send({ cmd: "stop" });
    } else {
      runCmd({ cmd: "runAll" });
    }
    return;
  }
  if (event.target.tagName === "INPUT") return;
  if (event.key === "/") {
    event.preventDefault();
    $("filter").focus();
    return;
  }
  if (event.key === "Enter" && event.ctrlKey && event.shiftKey) {
    runCmd({ cmd: "runAll" });
    return;
  }
  if (event.key === "ArrowDown" || event.key === "ArrowUp") {
    event.preventDefault();
    navigateSidebar(event.key === "ArrowDown" ? 1 : -1);
    return;
  }
  if (event.key === "Enter" && state.selected) {
    runCmd({ cmd: "runTest", id: state.selected });
  }
});

/* ── Sidebar resize ── */
(() => {
  const splitter = $("splitter");
  const sidebar = $("sidebar");
  let dragging = false;
  splitter.addEventListener("mousedown", (event) => {
    dragging = true;
    splitter.classList.add("dragging");
    event.preventDefault();
  });
  document.addEventListener("mousemove", (event) => {
    if (!dragging) return;
    sidebar.style.width = Math.max(240, Math.min(event.clientX, window.innerWidth * 0.7)) + "px";
  });
  document.addEventListener("mouseup", () => {
    dragging = false;
    splitter.classList.remove("dragging");
  });
})();

applyTheme();
connect();
renderAll();
window.__ferridriverUiState = state;
</script>
</body>
</html>

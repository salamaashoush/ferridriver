[test]
# Playwright specs under bench/pw-bench/ are driven by `npx playwright test`,
# not Bun's test runner; they call `test()` at top level in a way Bun can't
# schedule and would register 3 spurious "failures" at the repo root. Exclude
# bench/ entirely since nothing there is a Bun test — benchmarks are hand-run
# scripts.
pathIgnorePatterns = ["**/bench/**", "**/node_modules/**"]
